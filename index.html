<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4RKN HOST FINAL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');

body{
  margin:0;
  background:black;
  color:white;
  font-family:'Creepster';
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover no-repeat;
  filter:blur(5px) brightness(0.3);
  z-index:-1;
  pointer-events:none; /* FIX KLIK */
}

/* LOGIN */
#loginScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  z-index:10;
}

input{
  padding:10px;
  margin:5px;
  background:#111;
  border:none;
  color:white;
}

button{
  padding:10px 20px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
  position:relative;
  z-index:5; /* FIX KLIK */
}

/* MAIN */
#mainSite{display:none;}

.title{
  text-align:center;
  font-size:45px;
  color:red;
  margin-top:20px;
}

/* TERMINAL */
.terminal{
  width:90%;
  max-width:800px;
  margin:20px auto;
  background:rgba(0,0,0,0.9);
  border:2px solid red;
  padding:15px;
  height:250px;
  overflow-y:auto;
  font-family:monospace;
  color:#0f0;
}

/* GUIDE */
#guide{
  text-align:center;
  color:red;
}

/* GALLERY */
#gallery{
  display:none;
  padding:20px;
  text-align:center;
}
#gallery img{
  width:150px;
  margin:10px;
  border-radius:10px;
  transition:0.3s;
}
#gallery img:hover{
  transform:scale(1.1);
}

/* FLOAT TEXT */
.neon{
  position:absolute;
  color:red;
  animation:float 6s linear forwards;
}
@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-100px);opacity:0;}
}

/* JUMPSCARE */
#jumpscare{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none; /* FIX */
  z-index:999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>LOGIN 4RKN HOST</h2>
  <p>Follow IG <a href="https://instagram.com/4rknnnajaa" target="_blank">@4rknnnajaa</a><br>DM: "bang mau bikin akun"</p>
  
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">LOGIN</button>
  
  <p id="msg" style="color:red;"></p>
</div>

<!-- MAIN -->
<div id="mainSite">
  <div class="title">4RKN HOST</div>
  <div id="guide">Klik START SYSTEM</div>
  <button id="startBtn">START SYSTEM</button>

  <div class="terminal" id="terminal"></div>

  <div id="gallery">
    <h2 style="color:red;">DATA VISUAL</h2>
    <img src="IMG_20260307_162628_141.jpg">
    <img src="IMG_20260206_184434_707.jpg">
    <img src="IMG-20260314-WA0015.jpg">
  </div>
</div>

<!-- JUMPSCARE -->
<div id="jumpscare">
  <img src="https://i.imgur.com/Z6XK7vR.png" width="300">
</div>

<audio id="bg" src="https://www.myinstants.com/media/sounds/creepy-ambience.mp3" loop></audio>
<audio id="scare" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>

<script>
// LOGIN
const USER="ARKAN GANTENG";
const PASSWORDS=["ARKAN GANTENG","FOLLOW4RKN"];

document.getElementById("loginBtn").addEventListener("click", ()=>{
  let u=document.getElementById("user").value.trim();
  let p=document.getElementById("pass").value.trim();

  if(u===USER && PASSWORDS.includes(p.toUpperCase())){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("mainSite").style.display="block";
    document.getElementById("bg").play().catch(()=>{});
  }else{
    document.getElementById("msg").innerText="Salah! Follow & DM IG dulu!";
  }
});

// TERMINAL
const data=[
"Connecting...",
"Bypassing...",
"Access granted...",
"Loading data...",
"Scanning...",
"System injected...",
"System compromised..."
];

let i=0;

document.getElementById("startBtn").addEventListener("click", ()=>{
  let terminal=document.getElementById("terminal");
  let guide=document.getElementById("guide");

  i=0;
  terminal.innerHTML="";

  let interval=setInterval(()=>{
    if(i<data.length){
      terminal.innerHTML+=data[i]+"<br>";
      terminal.scrollTop=terminal.scrollHeight;
      guide.innerText=data[i];
      i++;
    }else{
      clearInterval(interval);
      result();
    }
  },700);
});

// RESULT
function result(){
  let jump=document.getElementById("jumpscare");

  setTimeout(()=>{
    jump.style.opacity=1;
    document.getElementById("scare").play();
  },1000);

  setTimeout(()=>{
    jump.style.opacity=0;
    document.getElementById("gallery").style.display="block";
  },3000);
}

// FLOAT TEXT
const quotes=["aku lelah...","sendiri...","gelap...","hilang..."];
setInterval(()=>{
  let q=document.createElement("div");
  q.className="neon";
  q.style.left=Math.random()*window.innerWidth+"px";
  q.innerText=quotes[Math.floor(Math.random()*quotes.length)];
  document.body.appendChild(q);
  setTimeout(()=>q.remove(),5000);
},1500);

</script>

</body>
</html>
